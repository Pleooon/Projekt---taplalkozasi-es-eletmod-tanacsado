    <script>
    const emailInput = document.getElementById("email-input");
const emailIcon = document.getElementById("email-icon");

emailInput.addEventListener("input", () => {
    const value = emailInput.value;

    if (value.includes("@")) {
        const domain = value.split("@")[1];

        if (domain.includes("gmail")) {
            emailIcon.textContent = "📧 Gmail";
        } else if (domain.includes("freemail")) {
            emailIcon.textContent = "📧 Freemail";
        } else if (domain.includes("citromail")) {
            emailIcon.textContent = "📧 Citromail";
        } else if (domain.includes("outlook") || domain.includes("hotmail")) {
            emailIcon.textContent = "📧 Outlook";
        } else {
            emailIcon.textContent = "📧 " + domain;
        }
    } else {
        emailIcon.textContent = "📧";
    }
});
</script>
